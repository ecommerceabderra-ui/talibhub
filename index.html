<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Store & Espace Étudiant</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <img src="logo1.png.jpeg">

  <!-- Espace étudiant أولا -->
  <button class="btn active" onclick="showStudent()">Espace étudiant FST</button>
  <button class="btn" onclick="showStore()">Store</button>
</div>

<div class="content">



<!-- STUDENT (هي التي تفتح أولاً) -->
 
<div id="student" class="section active">
  <button id="back-btn" onclick="resetSemesters()">← Retour</button>

  <div id="semesters-container" class="semesters">
    <div class="semester" onclick="showModules(1)">S1</div>
    <div class="semester" onclick="showModules(2)">S2</div>
    <div class="semester" onclick="showModules(3)">S3</div>
    <div class="semester" onclick="showModules(4)">S4</div>
  </div>

  <div id="modules-container" class="modules-container"></div>
</div>

</div>

<script src="scripts.js"></script>

</body>
</html>
